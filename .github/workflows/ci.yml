name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v3
      
      # Use the rustup pre-installed on GitHub runners instead of pulling
      # the dtolnay/rust-toolchain action, which has repeatedly 404'd
      # during archive download and red-lit otherwise-green builds.
      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install ${{ matrix.rust }} --profile minimal --no-self-update
          rustup default ${{ matrix.rust }}
          rustc --version

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          
      # Skip --all-features: it enables the `python` feature, which pulls
      # in PyO3 and requires a matching Python interpreter on the runner.
      # Python bindings are validated in the Python Tests job.
      - name: Run tests
        run: cargo test

      - name: Run tests (no default features)
        run: cargo test --no-default-features

  python:
    name: Python Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8.x', '3.9.x', '3.10.x', '3.11.x', '3.12.x', '3.13.x']
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          
      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version

      - name: Install maturin
        run: pip install maturin pytest

      - name: Build Python package
        working-directory: python
        run: |
          python -m pip install --upgrade pip
          maturin build --release --out ../dist

      - name: Install wheel (Unix)
        if: runner.os != 'Windows'
        run: pip install --force-reinstall dist/*.whl

      - name: Install wheel (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wheel = Get-ChildItem -Path dist -Filter *.whl | Select-Object -First 1
          pip install --force-reinstall $wheel.FullName

      - name: Run Python tests
        run: |
          cd python
          pytest tests/ -v
